name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
        env:
          EXPO_PUBLIC_DEEPSEEK_API_KEY: dummy
          EXPO_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: dummy
          EXPO_PUBLIC_SENTRY_DSN: https://dummy@sentry.io/123
